<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a84b"/>
      <stop offset="100%" style="stop-color:#e0c96a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#gold)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#gold)"/>

  <!-- Scales icon (left side) -->
  <g transform="translate(200,200) scale(2.5)">
    <rect x="-2" y="8" width="4" height="32" fill="#c8a84b" rx="1"/>
    <rect x="-14" y="38" width="28" height="4" fill="#c8a84b" rx="2"/>
    <rect x="-18" y="6" width="36" height="3" fill="#c8a84b" rx="1.5"/>
    <circle cx="0" cy="6" r="4" fill="#c8a84b"/>
    <circle cx="0" cy="6" r="2" fill="#0a0a0a"/>
    <line x1="-16" y1="9" x2="-16" y2="22" stroke="#c8a84b" stroke-width="1.5"/>
    <path d="M-22,22 Q-16,28 -10,22" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
    <line x1="16" y1="9" x2="16" y2="18" stroke="#c8a84b" stroke-width="1.5"/>
    <path d="M10,18 Q16,24 22,18" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
  </g>

  <!-- Title text -->
  <text x="420" y="250" font-family="Georgia, serif" font-size="72" font-weight="800" fill="#f0ece4">JudgeSearch</text>

  <!-- Tagline -->
  <text x="420" y="310" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#c8a84b">Know your judges. Hold them accountable.</text>

  <!-- Description -->
  <text x="420" y="380" font-family="monospace" font-size="18" fill="#a09a8c">Search real court records across 8 U.S. cities.</text>
  <text x="420" y="410" font-family="monospace" font-size="18" fill="#a09a8c">880,000+ cases. Public data. Sorted by impact.</text>

  <!-- Stats boxes -->
  <g transform="translate(420, 450)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#161616" stroke="#333" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="800" fill="#c8a84b">8</text>
    <text x="70" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6560" letter-spacing="1">CITIES</text>

    <rect x="160" y="0" width="140" height="60" rx="6" fill="#161616" stroke="#333" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="800" fill="#f0ece4">225+</text>
    <text x="230" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6560" letter-spacing="1">JUDGES</text>

    <rect x="320" y="0" width="140" height="60" rx="6" fill="#161616" stroke="#333" stroke-width="1"/>
    <text x="390" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="800" fill="#e84040">881K</text>
    <text x="390" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6560" letter-spacing="1">CASES</text>
  </g>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="monospace" font-size="16" fill="#6b6560">judge-search.barkleesanders.workers.dev</text>
</svg>
